<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영타 연습</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f0f4f8;
      color: #1e293b;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    h1 {
      font-size: 1.8rem;
      color: #4c1d95;
      margin-bottom: 8px;
      letter-spacing: 2px;
      font-weight: 900;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #475569;
      margin-bottom: 32px;
      font-weight: 600;
    }

    .stats-bar {
      display: flex;
      gap: 32px;
      margin-bottom: 24px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 900;
      color: #4c1d95;
    }

    .stat-label {
      font-size: 0.7rem;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }

    .passage-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .passage-btn {
      background: #e2e8f0;
      border: 1px solid #94a3b8;
      color: #1e293b;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      transition: all 0.2s;
    }

    .passage-btn:hover {
      border-color: #7c3aed;
      color: #7c3aed;
    }

    .passage-btn.active {
      background: #7c3aed;
      border-color: #7c3aed;
      color: #ffffff;
      font-weight: bold;
    }

    .typing-box {
      background: #ffffff;
      border: 1px solid #cbd5e1;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      border-radius: 12px;
      padding: 32px;
      max-width: 720px;
      width: 100%;
      margin-bottom: 20px;
    }

    .passage-title {
      font-size: 0.78rem;
      color: #475569;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 800;
    }

    .text-display {
      font-size: 1.4rem;
      line-height: 2.6;
      letter-spacing: 0.5px;
      word-break: break-word;
      min-height: 120px;
      margin-bottom: 24px;
      font-weight: 700;
    }

    .char {
      position: relative;
    }

    .char.correct {
      color: #16a34a;
    }

    .char.incorrect {
      color: #dc2626;
      background: rgba(220, 38, 38, 0.12);
      border-radius: 2px;
    }

    .char.current {
      border-bottom: 3px solid #7c3aed;
      color: #1e293b;
      animation: blink 0.8s infinite;
    }

    .char.pending {
      color: #64748b;
    }

    @keyframes blink {
      0%, 100% { border-bottom-color: #7c3aed; }
      50% { border-bottom-color: transparent; }
    }

    .input-area {
      width: 100%;
      background: #f8fafc;
      border: 2px solid #cbd5e1;
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 1.1rem;
      font-family: 'Courier New', monospace;
      color: #1e293b;
      font-weight: 700;
      outline: none;
      transition: border-color 0.2s;
      caret-color: #7c3aed;
    }

    .input-area:focus {
      border-color: #7c3aed;
      background: #ffffff;
    }

    .input-area.has-error {
      border-color: #dc2626;
      background: #fff5f5;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .btn {
      padding: 10px 24px;
      border-radius: 8px;
      border: none;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: #7c3aed;
      color: #ffffff;
      font-weight: bold;
    }

    .btn-primary:hover {
      background: #6d28d9;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #1e293b;
      border: 1px solid #94a3b8;
      font-weight: 700;
    }

    .btn-secondary:hover {
      border-color: #7c3aed;
      color: #7c3aed;
    }

    .result-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .result-overlay.show {
      display: flex;
    }

    .result-card {
      background: #ffffff;
      border: 2px solid #7c3aed;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      border-radius: 16px;
      padding: 48px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    .result-card h2 {
      font-size: 1.5rem;
      color: #4c1d95;
      margin-bottom: 32px;
    }

    .result-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 32px;
    }

    .result-stat-value {
      font-size: 2.5rem;
      font-weight: 900;
      color: #16a34a;
    }

    .result-stat-label {
      font-size: 0.75rem;
      color: #475569;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .progress-bar-wrap {
      background: #e2e8f0;
      border-radius: 4px;
      height: 4px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: #7c3aed;
      border-radius: 4px;
      transition: width 0.2s;
      width: 0%;
    }

    footer {
      margin-top: 24px;
      font-size: 0.75rem;
      color: #475569;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <h1>영타 연습</h1>
  <p class="subtitle">짧은 글을 따라 쓰며 타이핑 실력을 키워보세요</p>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-value" id="wpm">0</div>
      <div class="stat-label">WPM</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="accuracy">100%</div>
      <div class="stat-label">정확도</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="timer">0s</div>
      <div class="stat-label">시간</div>
    </div>
  </div>

  <div class="passage-selector" id="passageSelector"></div>

  <div class="typing-box">
    <div class="passage-title" id="passageTitle"></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="text-display" id="textDisplay"></div>
    <input
      class="input-area"
      id="inputArea"
      type="text"
      placeholder="여기를 클릭하고 타이핑을 시작하세요..."
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    >
  </div>

  <div class="controls">
    <button class="btn btn-primary" onclick="resetTyping()">다시 시작</button>
    <button class="btn btn-secondary" onclick="nextPassage()">다음 지문</button>
  </div>

  <div class="result-overlay" id="resultOverlay">
    <div class="result-card">
      <h2>완료!</h2>
      <div class="result-stats">
        <div class="stat">
          <div class="result-stat-value" id="finalWpm">0</div>
          <div class="result-stat-label">WPM</div>
        </div>
        <div class="stat">
          <div class="result-stat-value" id="finalAccuracy">0%</div>
          <div class="result-stat-label">정확도</div>
        </div>
        <div class="stat">
          <div class="result-stat-value" id="finalTime">0s</div>
          <div class="result-stat-label">시간</div>
        </div>
      </div>
      <div style="display:flex;gap:12px;justify-content:center;">
        <button class="btn btn-primary" onclick="resetTyping(); closeResult()">다시 하기</button>
        <button class="btn btn-secondary" onclick="nextPassage(); closeResult()">다음 지문</button>
      </div>
    </div>
  </div>

  <footer>Press Tab to skip a passage &nbsp;·&nbsp; Press Esc to reset</footer>

  <script>
    const passages = [
      {
        title: "The Little Prince — Antoine de Saint-Exupéry",
        text: "All grown-ups were once children, although few of them remember it."
      },
      {
        title: "Pride and Prejudice — Jane Austen",
        text: "It is a truth universally acknowledged, that a single man in possession of a good fortune, must be in want of a wife."
      },
      {
        title: "1984 — George Orwell",
        text: "It was a bright cold day in April, and the clocks were striking thirteen."
      },
      {
        title: "Moby-Dick — Herman Melville",
        text: "Call me Ishmael. Some years ago, never mind how long precisely, I thought I would sail about a little and see the watery part of the world."
      },
      {
        title: "The Great Gatsby — F. Scott Fitzgerald",
        text: "In my younger and more vulnerable years my father gave me some advice that I've been turning over in my mind ever since."
      },
      {
        title: "To Kill a Mockingbird — Harper Lee",
        text: "When he was nearly thirteen, my brother Jem got his arm badly broken at the elbow."
      },
      {
        title: "A Tale of Two Cities — Charles Dickens",
        text: "It was the best of times, it was the worst of times, it was the age of wisdom, it was the age of foolishness."
      },
      {
        title: "The Alchemist — Paulo Coelho",
        text: "It's the possibility of having a dream come true that makes life interesting."
      },
      {
        title: "Sherlock Holmes — Arthur Conan Doyle",
        text: "Elementary, my dear Watson. When you have eliminated the impossible, whatever remains, however improbable, must be the truth."
      },
      {
        title: "Anna Karenina — Leo Tolstoy",
        text: "Happy families are all alike; every unhappy family is unhappy in its own way."
      },
      {
        title: "Don Quixote — Miguel de Cervantes",
        text: "Too much sanity may be madness, and the maddest of all is to see life as it is and not as it should be."
      },
      {
        title: "The Old Man and the Sea — Ernest Hemingway",
        text: "He was an old man who fished alone in a skiff in the Gulf Stream and he had gone eighty-four days now without taking a fish."
      }
    ];

    let currentPassageIndex = 0;
    let typedCount = 0;
    let errorCount = 0;
    let startTime = null;
    let timerInterval = null;
    let finished = false;

    const textDisplay = document.getElementById('textDisplay');
    const inputArea = document.getElementById('inputArea');
    const passageTitle = document.getElementById('passageTitle');
    const wpmEl = document.getElementById('wpm');
    const accuracyEl = document.getElementById('accuracy');
    const timerEl = document.getElementById('timer');
    const progressBar = document.getElementById('progressBar');
    const passageSelector = document.getElementById('passageSelector');

    function buildPassageButtons() {
      passageSelector.innerHTML = '';
      passages.forEach((p, i) => {
        const btn = document.createElement('button');
        btn.className = 'passage-btn' + (i === currentPassageIndex ? ' active' : '');
        btn.textContent = (i + 1).toString();
        btn.title = p.title;
        btn.onclick = () => loadPassage(i);
        passageSelector.appendChild(btn);
      });
    }

    function renderText(typed) {
      const passage = passages[currentPassageIndex].text;
      let html = '';
      for (let i = 0; i < passage.length; i++) {
        const ch = passage[i] === ' ' ? '&nbsp;' : passage[i];
        if (i < typed.length) {
          if (typed[i] === passage[i]) {
            html += `<span class="char correct">${ch}</span>`;
          } else {
            const wrongCh = typed[i] === ' ' ? '&nbsp;' : typed[i];
            html += `<span class="char incorrect">${wrongCh}</span>`;
          }
        } else if (i === typed.length) {
          html += `<span class="char current">${ch}</span>`;
        } else {
          html += `<span class="char pending">${ch}</span>`;
        }
      }
      textDisplay.innerHTML = html;
    }

    function loadPassage(index) {
      currentPassageIndex = index;
      resetTyping();
    }

    function resetTyping() {
      clearInterval(timerInterval);
      typedCount = 0;
      errorCount = 0;
      startTime = null;
      finished = false;
      inputArea.value = '';
      inputArea.classList.remove('has-error');
      wpmEl.textContent = '0';
      accuracyEl.textContent = '100%';
      timerEl.textContent = '0s';
      progressBar.style.width = '0%';
      passageTitle.textContent = passages[currentPassageIndex].title;
      renderText('');
      buildPassageButtons();
      inputArea.focus();
    }

    function nextPassage() {
      currentPassageIndex = (currentPassageIndex + 1) % passages.length;
      loadPassage(currentPassageIndex);
    }

    function closeResult() {
      document.getElementById('resultOverlay').classList.remove('show');
    }

    function updateStats(typed) {
      const elapsed = startTime ? (Date.now() - startTime) / 1000 : 0;
      const words = typed.trim().split(/\s+/).filter(Boolean).length;
      const wpm = elapsed > 0 ? Math.round((words / elapsed) * 60) : 0;

      const passage = passages[currentPassageIndex].text;
      let errors = 0;
      for (let i = 0; i < typed.length; i++) {
        if (typed[i] !== passage[i]) errors++;
      }
      const acc = typed.length > 0
        ? Math.max(0, Math.round(((typed.length - errors) / typed.length) * 100))
        : 100;

      wpmEl.textContent = wpm;
      accuracyEl.textContent = acc + '%';
      progressBar.style.width = Math.min(100, (typed.length / passage.length * 100)) + '%';
    }

    inputArea.addEventListener('input', () => {
      if (finished) {
        inputArea.value = inputArea.value.slice(0, passages[currentPassageIndex].text.length);
        return;
      }

      const typed = inputArea.value;
      const passage = passages[currentPassageIndex].text;

      if (!startTime && typed.length > 0) {
        startTime = Date.now();
        timerInterval = setInterval(() => {
          const s = Math.round((Date.now() - startTime) / 1000);
          timerEl.textContent = s + 's';
        }, 500);
      }

      // Prevent over-typing
      if (typed.length > passage.length) {
        inputArea.value = typed.slice(0, passage.length);
        return;
      }

      const lastChar = typed[typed.length - 1];
      const expectedChar = passage[typed.length - 1];
      const hasError = lastChar !== expectedChar;
      inputArea.classList.toggle('has-error', hasError && typed.length > 0);

      renderText(typed);
      updateStats(typed);

      if (typed === passage) {
        finished = true;
        clearInterval(timerInterval);
        inputArea.classList.remove('has-error');
        progressBar.style.width = '100%';

        const elapsed = Math.round((Date.now() - startTime) / 1000);
        const words = passage.trim().split(/\s+/).length;
        const wpm = elapsed > 0 ? Math.round((words / elapsed) * 60) : 0;
        let errors = 0;
        for (let i = 0; i < typed.length; i++) {
          if (typed[i] !== passage[i]) errors++;
        }
        const acc = Math.max(0, Math.round(((typed.length - errors) / typed.length) * 100));

        document.getElementById('finalWpm').textContent = wpm;
        document.getElementById('finalAccuracy').textContent = acc + '%';
        document.getElementById('finalTime').textContent = elapsed + 's';

        setTimeout(() => {
          document.getElementById('resultOverlay').classList.add('show');
        }, 300);
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        resetTyping();
      } else if (e.key === 'Tab') {
        e.preventDefault();
        nextPassage();
      }
    });

    // Init
    resetTyping();
  </script>
</body>
</html>
