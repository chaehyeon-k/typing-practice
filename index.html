<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영타 연습</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #eef2ff;
      color: #1e293b;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    h1 {
      font-size: 1.8rem;
      color: #4c1d95;
      margin-bottom: 8px;
      letter-spacing: 2px;
      font-weight: 900;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #475569;
      margin-bottom: 32px;
      font-weight: 600;
    }

    .stats-bar {
      display: flex;
      gap: 32px;
      margin-bottom: 24px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 900;
      color: #4c1d95;
    }

    .stat-label {
      font-size: 0.7rem;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }

    .passage-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .passage-btn {
      background: #dde4f5;
      border: 1px solid #94a3b8;
      color: #1e293b;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      transition: all 0.2s;
    }

    .passage-btn:hover {
      border-color: #7c3aed;
      color: #7c3aed;
    }

    .passage-btn.active {
      background: #7c3aed;
      border-color: #7c3aed;
      color: #ffffff;
      font-weight: bold;
    }

    .typing-box {
      background: #ffffff;
      border: 1px solid #c7d2fe;
      box-shadow: 0 4px 24px rgba(99, 102, 241, 0.1);
      border-radius: 14px;
      padding: 32px;
      max-width: 780px;
      width: 100%;
      margin-bottom: 20px;
    }

    .passage-title {
      font-size: 0.78rem;
      color: #6d28d9;
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 800;
    }

    .progress-bar-wrap {
      background: #e2e8f0;
      border-radius: 4px;
      height: 5px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: #7c3aed;
      border-radius: 4px;
      transition: width 0.2s;
      width: 0%;
    }

    .text-display {
      font-size: 1.25rem;
      line-height: 2.4;
      letter-spacing: 0.3px;
      word-break: break-word;
      margin-bottom: 24px;
      font-weight: 700;
      background: #f8faff;
      border: 1px solid #e0e7ff;
      border-radius: 8px;
      padding: 20px 24px;
      white-space: pre-wrap;
    }

    .char.correct {
      color: #15803d;
    }

    .char.incorrect {
      color: #dc2626;
      background: rgba(220, 38, 38, 0.13);
      border-radius: 2px;
    }

    .char.current {
      border-bottom: 3px solid #7c3aed;
      color: #1e293b;
      animation: blink 0.8s infinite;
    }

    .char.pending {
      color: #475569;
    }

    @keyframes blink {
      0%, 100% { border-bottom-color: #7c3aed; }
      50% { border-bottom-color: transparent; }
    }

    .input-area {
      width: 100%;
      background: #f8fafc;
      border: 2px solid #c7d2fe;
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 1.05rem;
      font-family: 'Courier New', monospace;
      color: #1e293b;
      font-weight: 700;
      outline: none;
      transition: border-color 0.2s;
      caret-color: #7c3aed;
      resize: none;
      line-height: 1.8;
      min-height: 110px;
    }

    .input-area:focus {
      border-color: #7c3aed;
      background: #ffffff;
    }

    .input-area.has-error {
      border-color: #dc2626;
      background: #fff5f5;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .btn {
      padding: 10px 24px;
      border-radius: 8px;
      border: none;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
      font-weight: 700;
    }

    .btn-primary {
      background: #7c3aed;
      color: #ffffff;
    }

    .btn-primary:hover {
      background: #6d28d9;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #1e293b;
      border: 1px solid #94a3b8;
    }

    .btn-secondary:hover {
      border-color: #7c3aed;
      color: #7c3aed;
    }

    .result-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .result-overlay.show {
      display: flex;
    }

    .result-card {
      background: #ffffff;
      border: 2px solid #7c3aed;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      border-radius: 16px;
      padding: 48px;
      text-align: center;
      max-width: 420px;
      width: 90%;
    }

    .result-card h2 {
      font-size: 1.6rem;
      color: #4c1d95;
      margin-bottom: 32px;
    }

    .result-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 32px;
    }

    .result-stat-value {
      font-size: 2.5rem;
      font-weight: 900;
      color: #16a34a;
    }

    .result-stat-label {
      font-size: 0.75rem;
      color: #475569;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    footer {
      margin-top: 24px;
      font-size: 0.75rem;
      color: #64748b;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <h1>영타 연습</h1>
  <p class="subtitle">문단을 따라 쓰며 타이핑 실력을 키워보세요</p>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-value" id="wpm">0</div>
      <div class="stat-label">WPM</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="accuracy">100%</div>
      <div class="stat-label">정확도</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="timer">0s</div>
      <div class="stat-label">시간</div>
    </div>
  </div>

  <div class="passage-selector" id="passageSelector"></div>

  <div class="typing-box">
    <div class="passage-title" id="passageTitle"></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="text-display" id="textDisplay"></div>
    <textarea
      class="input-area"
      id="inputArea"
      placeholder="여기를 클릭하고 타이핑을 시작하세요..."
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    ></textarea>
  </div>

  <div class="controls">
    <button class="btn btn-primary" onclick="resetTyping()">다시 시작</button>
    <button class="btn btn-secondary" onclick="nextPassage()">다음 지문</button>
  </div>

  <div class="result-overlay" id="resultOverlay">
    <div class="result-card">
      <h2>🎉 완료!</h2>
      <div class="result-stats">
        <div class="stat">
          <div class="result-stat-value" id="finalWpm">0</div>
          <div class="result-stat-label">WPM</div>
        </div>
        <div class="stat">
          <div class="result-stat-value" id="finalAccuracy">0%</div>
          <div class="result-stat-label">정확도</div>
        </div>
        <div class="stat">
          <div class="result-stat-value" id="finalTime">0s</div>
          <div class="result-stat-label">시간</div>
        </div>
      </div>
      <div style="display:flex;gap:12px;justify-content:center;">
        <button class="btn btn-primary" onclick="resetTyping(); closeResult()">다시 하기</button>
        <button class="btn btn-secondary" onclick="nextPassage(); closeResult()">다음 지문</button>
      </div>
    </div>
  </div>

  <footer>Tab → 다음 지문 &nbsp;·&nbsp; Esc → 다시 시작</footer>

  <script>
    const passages = [
      {
        title: "The Little Prince — Antoine de Saint-Exupéry",
        text: "All grown-ups were once children, although few of them remember it. And I think it is a great pity that they forget. They forget what it felt like to wonder, to imagine, and to see the world as a place full of magic and mystery. The most beautiful things in the world cannot be seen or touched. They are felt with the heart."
      },
      {
        title: "Pride and Prejudice — Jane Austen",
        text: "It is a truth universally acknowledged, that a single man in possession of a good fortune, must be in want of a wife. However little known the feelings or views of such a man may be on his first entering a neighbourhood, this truth is so well fixed in the minds of the surrounding families, that he is considered as the rightful property of some one or other of their daughters."
      },
      {
        title: "1984 — George Orwell",
        text: "It was a bright cold day in April, and the clocks were striking thirteen. Winston Smith, his chin nuzzled into his breast in an effort to escape the vile wind, slipped quickly through the glass doors of Victory Mansions, though not quickly enough to prevent a swirl of gritty dust from entering along with him. The hallway smelt of boiled cabbage and old rag mats."
      },
      {
        title: "Moby-Dick — Herman Melville",
        text: "Call me Ishmael. Some years ago, never mind how long precisely, having little money in my pocket and nothing particular to interest me on shore, I thought I would sail about a little and see the watery part of the world. It is a way I have of driving off the spleen and regulating the circulation. Whenever I find myself growing grim about the mouth, I take to the sea."
      },
      {
        title: "The Great Gatsby — F. Scott Fitzgerald",
        text: "In my younger and more vulnerable years my father gave me some advice that I have been turning over in my mind ever since. Whenever you feel like criticizing anyone, he told me, just remember that all the people in this world have not had the advantages that you have had. He did not say any more, but we had always been unusually communicative in a reserved way."
      },
      {
        title: "To Kill a Mockingbird — Harper Lee",
        text: "Maycomb was an old town, but it was a tired old town when I first knew it. In rainy weather the streets turned to red slop; grass grew on the sidewalks, the courthouse sagged in the square. Somehow, it was hotter then. Men's stiff collars wilted by nine in the morning. Ladies bathed before noon, after their three-o'clock naps, and by nightfall were like soft teacakes with frostings of sweat."
      },
      {
        title: "A Tale of Two Cities — Charles Dickens",
        text: "It was the best of times, it was the worst of times, it was the age of wisdom, it was the age of foolishness, it was the epoch of belief, it was the epoch of incredulity, it was the season of Light, it was the season of Darkness, it was the spring of hope, it was the winter of despair. We had everything before us, we had nothing before us."
      },
      {
        title: "The Alchemist — Paulo Coelho",
        text: "It is the possibility of having a dream come true that makes life interesting. And when you want something, all the universe conspires in helping you to achieve it. People are capable, at any time in their lives, of doing what they dream of. You will never be able to escape from your heart. So it is better to listen to what it has to say."
      },
      {
        title: "Sherlock Holmes — Arthur Conan Doyle",
        text: "When you have eliminated the impossible, whatever remains, however improbable, must be the truth. It is a capital mistake to theorize before one has data. Insensibly one begins to twist facts to suit theories, instead of theories to suit facts. I never guess. It is a shocking habit, destructive to the logical faculty. Data, data, data. I cannot make bricks without clay."
      },
      {
        title: "Anna Karenina — Leo Tolstoy",
        text: "Happy families are all alike; every unhappy family is unhappy in its own way. Everything was in confusion in the Oblonskys house. The wife had discovered that the husband was carrying on an intrigue with a French girl who had been a governess in their family, and she had announced to her husband that she could not go on living in the same house with him."
      },
      {
        title: "The Old Man and the Sea — Ernest Hemingway",
        text: "He was an old man who fished alone in a skiff in the Gulf Stream and he had gone eighty-four days now without taking a fish. In the first forty days a boy had been with him. But after forty days without a fish the boy's parents had told him that the old man was now definitely and finally salao, which is the worst form of unlucky, and the boy had gone at their orders in another boat."
      },
      {
        title: "Brave New World — Aldous Huxley",
        text: "A squat grey building of only thirty-four stories. Over the main entrance the words Central London Hatchery and Conditioning Centre, and, in a shield, the World State's motto, Community, Identity, Stability. The enormous room on the ground floor faced towards the north. Cold for all the summer beyond the panes, for all the tropical heat of the room itself, a harsh thin light glared through the windows."
      }
    ];

    let currentPassageIndex = 0;
    let startTime = null;
    let timerInterval = null;
    let finished = false;

    const textDisplay = document.getElementById('textDisplay');
    const inputArea  = document.getElementById('inputArea');
    const passageTitle = document.getElementById('passageTitle');
    const wpmEl      = document.getElementById('wpm');
    const accuracyEl = document.getElementById('accuracy');
    const timerEl    = document.getElementById('timer');
    const progressBar = document.getElementById('progressBar');
    const passageSelector = document.getElementById('passageSelector');

    function buildPassageButtons() {
      passageSelector.innerHTML = '';
      passages.forEach((p, i) => {
        const btn = document.createElement('button');
        btn.className = 'passage-btn' + (i === currentPassageIndex ? ' active' : '');
        btn.textContent = (i + 1).toString();
        btn.title = p.title;
        btn.onclick = () => loadPassage(i);
        passageSelector.appendChild(btn);
      });
    }

    function renderText(typed) {
      const passage = passages[currentPassageIndex].text;
      let html = '';
      for (let i = 0; i < passage.length; i++) {
        const raw = passage[i];
        const ch  = raw === ' ' ? '&nbsp;' : raw === '\n' ? '\n' : raw;
        if (i < typed.length) {
          if (typed[i] === raw) {
            html += `<span class="char correct">${ch}</span>`;
          } else {
            const wrongCh = typed[i] === ' ' ? '&nbsp;' : (typed[i] || '');
            html += `<span class="char incorrect">${wrongCh || ch}</span>`;
          }
        } else if (i === typed.length) {
          html += `<span class="char current">${ch}</span>`;
        } else {
          html += `<span class="char pending">${ch}</span>`;
        }
      }
      textDisplay.innerHTML = html;
    }

    function loadPassage(index) {
      currentPassageIndex = index;
      resetTyping();
    }

    function resetTyping() {
      clearInterval(timerInterval);
      startTime = null;
      finished   = false;
      inputArea.value = '';
      inputArea.classList.remove('has-error');
      wpmEl.textContent      = '0';
      accuracyEl.textContent = '100%';
      timerEl.textContent    = '0s';
      progressBar.style.width = '0%';
      passageTitle.textContent = passages[currentPassageIndex].title;
      renderText('');
      buildPassageButtons();
      inputArea.focus();
    }

    function nextPassage() {
      currentPassageIndex = (currentPassageIndex + 1) % passages.length;
      loadPassage(currentPassageIndex);
    }

    function closeResult() {
      document.getElementById('resultOverlay').classList.remove('show');
    }

    function calcStats(typed) {
      const elapsed = startTime ? (Date.now() - startTime) / 1000 : 0;
      const words   = typed.trim().split(/\s+/).filter(Boolean).length;
      const wpm     = elapsed > 0 ? Math.round((words / elapsed) * 60) : 0;

      const passage = passages[currentPassageIndex].text;
      let errors = 0;
      for (let i = 0; i < typed.length; i++) {
        if (typed[i] !== passage[i]) errors++;
      }
      const acc = typed.length > 0
        ? Math.max(0, Math.round(((typed.length - errors) / typed.length) * 100))
        : 100;

      return { wpm, acc, elapsed: Math.round(elapsed), errors };
    }

    inputArea.addEventListener('input', () => {
      if (finished) {
        inputArea.value = inputArea.value.slice(0, passages[currentPassageIndex].text.length);
        return;
      }

      const typed   = inputArea.value;
      const passage = passages[currentPassageIndex].text;

      if (!startTime && typed.length > 0) {
        startTime = Date.now();
        timerInterval = setInterval(() => {
          const s = Math.round((Date.now() - startTime) / 1000);
          timerEl.textContent = s + 's';
        }, 500);
      }

      if (typed.length > passage.length) {
        inputArea.value = typed.slice(0, passage.length);
        return;
      }

      const lastIdx = typed.length - 1;
      const hasError = lastIdx >= 0 && typed[lastIdx] !== passage[lastIdx];
      inputArea.classList.toggle('has-error', hasError);

      renderText(typed);

      const { wpm, acc } = calcStats(typed);
      wpmEl.textContent      = wpm;
      accuracyEl.textContent = acc + '%';
      progressBar.style.width = Math.min(100, (typed.length / passage.length) * 100) + '%';

      if (typed === passage) {
        finished = true;
        clearInterval(timerInterval);
        inputArea.classList.remove('has-error');
        progressBar.style.width = '100%';

        const { wpm: fw, acc: fa, elapsed: fe } = calcStats(typed);
        document.getElementById('finalWpm').textContent      = fw;
        document.getElementById('finalAccuracy').textContent = fa + '%';
        document.getElementById('finalTime').textContent     = fe + 's';

        setTimeout(() => {
          document.getElementById('resultOverlay').classList.add('show');
        }, 300);
      }
    });

    // Tab 키가 textarea 안에서 포커스 이동하지 않도록
    inputArea.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        nextPassage();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') resetTyping();
    });

    resetTyping();
  </script>
</body>
</html>
